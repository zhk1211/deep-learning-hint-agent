    <title>Verification</title>
</head>
<body>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async="" defer=""></script>

    <script>
        /**
         * Success callback.
         * Triggered automatically by Cloudflare when the user passes the challenge.
         */
        function onTurnstileSuccess(token) {
            // Prepare data
            const params = new URLSearchParams();
            params.append("action", "verify");
            params.append("response", token);

            // Send request immediately via Fetch API
            fetch("/data/turnstile", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: params
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                return response.json();
            })
            .then(data => {
                // Check server response
                if (data.success === "true" || data.success === true) {
                    // Success: Reload the page to access the content
                    window.location.reload();
                } else {
                    throw new Error("Server verification failed");
                }
            })
            .catch(error => {
                console.error("Verification error:", error);
                
                // UX: Alert the user and reset the widget so they can try again
                alert("Verification failed or network error. Please try again.");
                
                if (window.turnstile) {
                    turnstile.reset();
                }
            });
        }

        /**
         * Expiration callback.
         * Triggered if the user solved the captcha but the token expired.
         */
        function onTurnstileExpired() {
            // Usually nothing to do here in auto-submit mode, 
            // but we can reset to be safe.
            if (window.turnstile) {
                turnstile.reset();
            }
        }
    </script>
